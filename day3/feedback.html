<!DOCTYPE html>
<html>
<head>
    <title>College Student Feedback Form</title>
    <link rel="stylesheet" href="feedback.css">
</head>
<body>
<div class="container">
    <h2>College Student Feedback Form</h2>
    <form>
        <label>Student Name:</label>
        <input type="text" name="name" placeholder="Enter your name">
        <label>Roll Number:</label>
        <input type="text"name="roll">
        <label>Department:</label>
        <select>
            <option>CSE</option>
            <option>IT</option>
            <option>ECE</option>
            <option>AIML</option>
            <option>AIDS</option>
            <option>CSBS</option>
        </select>
        <label>Year:</label>
        <select>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
        </select>
        <label>Teaching Quality:</label><br><br>
        <input type="radio" name="rating"> Excellent
        <input type="radio" name="rating"> Good
        <input type="radio" name="rating"> Average
        <input type="radio" name="rating"> Poor
        <br
        <label>Facilities Used:</label><br>
        <input type="checkbox"> Library <br>
        <input type="checkbox">gym <br>
        <input type="checkbox"> Sports <br>
        <input type="checkbox"> Hostel
        <br><br>
        <label>Suggestions:</label>
        <textarea rows="4"></textarea>
        <br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Clear">
    </form>
</div>
</body>
</html>
